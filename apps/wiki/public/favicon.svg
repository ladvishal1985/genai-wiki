<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1e1b4b"/>

  <!-- Connection lines -->
  <g stroke="#6366f1" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
    <!-- outer ring -->
    <line x1="16" y1="5"  x2="6"  y2="16"/>
    <line x1="16" y1="5"  x2="26" y2="16"/>
    <line x1="6"  y1="16" x2="16" y2="27"/>
    <line x1="26" y1="16" x2="16" y2="27"/>
    <!-- spokes to center -->
    <line x1="16" y1="5"  x2="16" y2="16"/>
    <line x1="6"  y1="16" x2="16" y2="16"/>
    <line x1="26" y1="16" x2="16" y2="16"/>
    <line x1="16" y1="27" x2="16" y2="16"/>
  </g>

  <!-- Outer nodes -->
  <circle cx="16" cy="5"  r="2.5" fill="#818cf8"/>
  <circle cx="6"  cy="16" r="2.5" fill="#818cf8"/>
  <circle cx="26" cy="16" r="2.5" fill="#818cf8"/>
  <circle cx="16" cy="27" r="2.5" fill="#818cf8"/>

  <!-- Center node — brightest, represents core knowledge -->
  <circle cx="16" cy="16" r="4" fill="#e0e7ff"/>
</svg>
