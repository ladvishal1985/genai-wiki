name: Deploy Dictionary

on:
  push:
    branches: [main]
    paths:
      - 'apps/gen-ai-dictionary/**'
      - 'content/dictionary/**'
      - 'scripts/**'
      - '.github/workflows/deploy-dictionary.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/gen-ai-dictionary/**'
      - 'content/dictionary/**'
      - 'scripts/**'

concurrency:
  group: deploy-dictionary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Dictionary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build manifest
        run: pnpm build:manifest

      - name: Build dictionary
        run: pnpm --filter gen-ai-dictionary build

      - name: Deploy to Vercel (preview)
        if: github.event_name == 'pull_request'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DICTIONARY }}
          working-directory: apps/gen-ai-dictionary

      - name: Deploy to Vercel (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DICTIONARY }}
          vercel-args: '--prod'
          working-directory: apps/gen-ai-dictionary
